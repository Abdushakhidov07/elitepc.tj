upstream backend {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Max upload size (for product images, etc.)
    client_max_body_size 20M;

    # ──────────────────────────────────────────
    # Proxy API requests to Django backend
    # ──────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ──────────────────────────────────────────
    # Proxy Django admin to backend
    # ──────────────────────────────────────────
    location /django-admin/ {
        proxy_pass http://backend/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ──────────────────────────────────────────
    # Django static files (collectstatic output)
    # ──────────────────────────────────────────
    location /static/ {
        alias /usr/share/nginx/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ──────────────────────────────────────────
    # Django media files (user uploads)
    # ──────────────────────────────────────────
    location /media/ {
        alias /usr/share/nginx/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ──────────────────────────────────────────
    # Frontend static assets (JS, CSS, images)
    # ──────────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ──────────────────────────────────────────
    # SPA fallback — all other routes go to React
    # ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
